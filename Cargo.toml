[workspace]
members = ["griswold", "policies/*"]

[workspace.dependencies]
paralegal-policy = { git = "https://github.com/brownsys/paralegal", rev = "44d710c389265d0fb05b5e0ed26191fa3d257b27"  }
#paralegal-policy = { path = "../paralegal/crates/paralegal-policy" }
paralegal-spdg = { git = "https://github.com/brownsys/paralegal", rev = "44d710c389265d0fb05b5e0ed26191fa3d257b27"  }
#paralegal-spdg = { path = "../paralegal/crates/paralegal-spdg" }
clap = { version = "=4.4.18", features = ["derive"] }
petgraph = { version = "0.6" }
anyhow = { version = "1", features = ["backtrace"] }
serde = { version = "1", features = ["derive"] }
strum = { version = "0.26", features = ["derive"] }

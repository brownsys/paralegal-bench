[workspace]
members = ["griswold", "policies/*"]

[workspace.dependencies]
clap = { version = "=4.4.18", features = ["derive"] }
petgraph = { version = "0.6" }
anyhow = { version = "1", features = ["backtrace"] }
serde = { version = "1", features = ["derive"] }
strum = { version = "0.26", features = ["derive"] }

[workspace.dependencies.paralegal-policy]
rev = "5b3999bc9a637ac7d7b7fd310b73151543c76071"
git = "https://github.com/brownsys/paralegal"

[workspace.dependencies.paralegal-spdg]
rev = "5b3999bc9a637ac7d7b7fd310b73151543c76071"
git = "https://github.com/brownsys/paralegal"

stat-refresh-interval = "500ms"
paralegal-home-dir = "../paralegal"
pdg-timeout = "10min"

[app-config.lemmy]
source-dir = "case-studies/lemmy"
flow-args = ["--target", "lemmy_api"]
external-annotations = "external-annotations.toml"

[app-config.plume]
source-dir = "case-studies/plume"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "plume-models"]
cargo-args = ["--no-default-features", "--features", "postgres"]

[app-config.websubmit]
source-dir = "case-studies/websubmit"
external-annotations = "baseline-external-annotations.toml"

[app-config.websubmit-lib]
source-dir = "case-studies/websubmit"
external-annotations = "lib-external-annotations.toml"

[app-config.websubmit-strict]
source-dir = "case-studies/websubmit"
external-annotations = "strict-external-annotations.toml"

[app-config.freedit]
source-dir = "case-studies/freedit"
cargo-args = ["--lib"]
external-annotations = "external-annotations.toml"

[app-config.atomic-data]
source-dir = "case-studies/atomic-server"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "atomic_lib"]
cargo-args = ["--lib", "--features", "db"]

[app-config.atomic-data.version-override.proc-macro2]
replacement = "1.0.78"
original = "1"

[app-config.hyperswitch]
source-dir = "case-studies/hyperswitch"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "router"]
cargo-args = ["--lib"]

[app-config.contile]
source-dir = "case-studies/contile"
external-annotations = "external-annotations.toml"
cargo-args = ["--lib"]


[[experiment.case-studies]]
mode = "case-study"
application = "plume"

[[experiment.case-studies]]
mode = "case-study"
application = "freedit"

[[experiment.case-studies]]
mode = "case-study"
application = "websubmit"

[[experiment.case-studies]]
mode = "case-study"
application = "atomic-data"

[[experiment.adaptive-depth]]
mode = "case-study"
application = "lemmy"

[[experiment.case-studies]]
mode = "case-study"
application = "hyperswitch"
policies = ["card-storage"]

[[experiment.case-studies]]
mode = "case-study"
application = "contile"
# Otherwise we overtaint and don't pass the non-bug
adaptive-depth = false

[[experiment.ablation]]
mode = "ablation"
application = "websubmit"
feature-space-success = ["edit-del-1-a", "edit-del-2-a", "edit-del-3-a"]
feature-space-fail = [
    "edit-del-1-b",
    "edit-del-1-c",
    "edit-del-2-b",
    "edit-del-2-c",
    "edit-del-3-b",
    "edit-del-3-c",
]
policies = ["deletion"]

[[experiment.ablation]]
mode = "ablation"
application = "websubmit"
flavour = "lib"
app-config-override = "websubmit-lib"
feature-space-success = ["edit-del-1-a", "edit-del-2-a", "edit-del-3-a"]
feature-space-fail = [
    "edit-del-1-b",
    "edit-del-1-c",
    "edit-del-2-b",
    "edit-del-2-c",
    "edit-del-3-b",
    "edit-del-3-c",
]
policies = ["deletion"]


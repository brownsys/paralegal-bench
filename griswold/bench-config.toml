stat-refresh-interval = "500ms"
paralegal-home-dir = "../paralegal"

[app-config.lemmy]
source-dir = "case-studies/lemmy"
flow-args = ["--target", "lemmy_api"]
external-annotations = "external-annotations.toml"

[app-config.plume]
source-dir = "case-studies/plume"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "plume-models"]
cargo-args = ["--no-default-features", "--features", "postgres"]

[app-config.websubmit]
source-dir = "case-studies/websubmit"
external-annotations = "baseline-external-annotations.toml"
cargo-args = ["--features", "v-ann-baseline"]

[app-config.websubmit-lib]
source-dir = "case-studies/websubmit"
external-annotations = "lib-external-annotations.toml"
cargo-args = ["--features", "v-ann-lib"]

[app-config.websubmit-strict]
source-dir = "case-studies/websubmit"
external-annotations = "strict-external-annotations.toml"
cargo-args = ["--features", "v-ann-strict"]

[app-config.freedit]
source-dir = "case-studies/freedit"
cargo-args = ["--lib"]
external-annotations = "external-annotations.toml"

[app-config.atomic-data]
source-dir = "case-studies/atomic-server"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "atomic_lib"]
cargo-args = ["--lib", "--features", "db"]

[app-config.hyperswitch]
source-dir = "case-studies/hyperswitch"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "--router"]
cargo-args = ["--lib"]

[app-config.original-plume]
source-dir = "../../clones/Plume"
external-annotations = "../../research/dfpp-verification/case-studies/plume/external-annotations.toml"
flow-args = [
    "--target",
    "plume-models",
    "--analyze",
    "crate::users::User::delete",
]
cargo-args = ["--no-default-features", "--features", "postgres"]

[app-config.original-plume.crate-override.proc-macro2]
replacement = "1.0.78"
originals = ["1.0.49"]


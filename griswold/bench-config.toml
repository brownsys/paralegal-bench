stat-refresh-interval = "500ms"
paralegal-home-dir = "../paralegal"

[app-config.lemmy]
source-dir = "case-studies/lemmy"
flow-args = ["--target", "lemmy_api"]
external-annotations = "external-annotations.toml"

[app-config.plume]
source-dir = "case-studies/plume"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "plume-models"]
cargo-args = ["--no-default-features", "--features", "postgres"]

[app-config.websubmit]
source-dir = "case-studies/websubmit"

[app-config.freedit]
source-dir = "case-studies/freedit"
cargo-args = ["--lib"]
external-annotations = "external-annotations.toml"

[app-config.atomic-data]
source-dir = "case-studies/atomic-server"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "atomic_lib"]
cargo-args = ["--lib", "--features", "db"]

[app-config.hyperswitch]
source-dir = "case-studies/hyperswitch"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "--router"]
cargo-args = ["--lib"]

[app-config.original-plume]
source-dir = "case-studies/plume"
external-annotations = "external-annotations.toml"
flow-args = ["--target", "plume-models"]
cargo-args = ["--no-default-features", "--features", "postgres"]

# Disabled because it worked
[[experiment.case-studies]]
mode = "case-study"
application = "lemmy"

[[experiment.case-studies]]
mode = "case-study"
application = "plume"

[[experiment.case-studies]]
mode = "case-study"
application = "freedit"

[[experiment.case-studies]]
mode = "case-study"
application = "websubmit"

# Does not work on AL2
# [[experiment]]
# mode = "case-study"
# application = "atomic-data"

[[experiment.adaptive-depth]]
mode = "case-study"
application = "lemmy"
adaptive-depth = false

[[experiment.ablation]]
mode = "ablation"
application = "websubmit"
feature-space-success = ["edit-del-1-a", "edit-del-2-a", "edit-del-3-a"]
feature-space-fail = [
    "edit-del-1-b",
    "edit-del-1-c",
    "edit-del-2-b",
    "edit-del-2-c",
    "edit-del-3-b",
    "edit-del-3-c",
]
policies = ["deletion"]

[[experiment.ablation]]
mode = "ablation"
application = "websubmit"
feature-space-success = ["edit-sc-1-a"]
feature-space-fail = ["edit-sc-1-b", "edit-sc-1-c"]
policies = ["scoped-storage"]

[[experiment.ablation]]
mode = "ablation"
application = "websubmit"
feature-space-success = ["edit-dis-1-a", "edit-dis-2-a", "edit-dis-3-a"]
feature-space-fail = [
    "edit-dis-1-b",
    "edit-dis-1-c",
    "edit-dis-2-b",
    "edit-dis-2-c",
    "edit-dis-3-b",
    "edit-dis-3-c",
]
policies = ["authorized-disclosure"]

[[experiment.plume-roll-forward]]
mode = "roll-forward"
application = "plume"
pass-threshold = ["19f184"]
fail-threshold = []
app-config-override = "original-plume"
